spring:
 application.name: demo
 datasource:
  url: jdbc:mysql://localhost:3306/liya
  username: root
  password:
  driver-class-name: com.mysql.jdbc.Driver

 jpa:
  properties:
   hibernate:
    dialect: org.hibernate.dialect.MySQL5InnoDBDialect
  hibernate:
   ddl-auto: update
server:
 port: 8082
eureka:
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
    defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
